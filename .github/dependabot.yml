version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Africa/Lusaka
    open-pull-requests-limit: 5
    groups:
      python-quality-tools:
        patterns:
          - build
          - pytest
          - ruff
          - twine

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Africa/Lusaka
    open-pull-requests-limit: 5
