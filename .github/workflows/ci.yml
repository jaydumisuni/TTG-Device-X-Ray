name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUTF8: "1"

jobs:
  quality:
    name: Quality and package gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project and quality tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Validate profiles
        run: python scripts/validate_profiles.py

      - name: Validate replay fixtures
        run: python scripts/validate_fixtures.py

      - name: Enforce read-only command boundary
        run: python scripts/check_read_only.py

      - name: Run Ruff
        run: python -m ruff check .

      - name: Build and validate package metadata
        run: |
          python -m build --outdir dist-check
          python -m twine check dist-check/*
          python scripts/validate_distribution.py dist-check

  tests:
    name: Python ${{ matrix.python-version }} tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project and test tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q

  windows-smoke:
    name: Windows smoke tests
    runs-on: windows-latest
    timeout-minutes: 12
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project and test tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q

      - name: Exercise CLI doctor
        run: ttg-xray doctor

  windows-package:
    name: Package standalone Qt EXE
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Qt packaging tools
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install "PySide6>=6.8,<7" "PyInstaller>=6.11,<7"

      - name: Validate Qt entry point
        shell: pwsh
        run: |
          python -c "from ttg_device_xray.qt_app import default_output_directory; print(default_output_directory())"

      - name: Build standalone executable
        shell: pwsh
        run: .\packaging\windows\build_exe.ps1 -OutputDir "dist-exe"

      - name: Validate executable
        shell: pwsh
        run: |
          $exe = Get-Item ".\dist-exe\TTG-Device-XRay.exe"
          if ($exe.Length -lt 10000000) {
            throw "Executable is unexpectedly small: $($exe.Length) bytes"
          }
          $exe | Format-List Name,Length,LastWriteTime

      - name: Upload executable smoke artifact
        uses: actions/upload-artifact@v7
        with:
          name: ttg-device-xray-windows-smoke
          path: dist-exe/TTG-Device-XRay.exe
          if-no-files-found: error
          retention-days: 7

  ci-gate:
    name: CI Gate
    if: always()
    needs:
      - quality
      - tests
      - windows-smoke
      - windows-package
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Require every CI lane to pass
        env:
          QUALITY_RESULT: ${{ needs.quality.result }}
          TEST_RESULT: ${{ needs.tests.result }}
          WINDOWS_RESULT: ${{ needs.windows-smoke.result }}
          PACKAGE_RESULT: ${{ needs.windows-package.result }}
        run: |
          printf 'quality=%s\ntests=%s\nwindows=%s\npackage=%s\n' \
            "$QUALITY_RESULT" "$TEST_RESULT" "$WINDOWS_RESULT" "$PACKAGE_RESULT"
          test "$QUALITY_RESULT" = "success"
          test "$TEST_RESULT" = "success"
          test "$WINDOWS_RESULT" = "success"
          test "$PACKAGE_RESULT" = "success"
