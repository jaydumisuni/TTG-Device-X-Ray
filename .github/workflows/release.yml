name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Approved production release version, for example v0.4.3
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

concurrency:
  group: release-${{ github.ref }}-${{ inputs.tag || 'tag' }}
  cancel-in-progress: false

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUTF8: "1"

jobs:
  release:
    name: Build and publish approved Windows release
    runs-on: windows-latest
    timeout-minutes: 35

    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Resolve and enforce production release tag
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_TYPE -eq "tag") {
            $tag = $env:GITHUB_REF_NAME
          } else {
            $tag = "${{ inputs.tag }}"
          }
          if ($tag -match '(?i)(dev|alpha|beta|rc|test|internal)') {
            throw "Development or pre-release tags cannot publish to the public product repository: $tag"
          }
          "RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Approved production release tag: $tag"

      - name: Install project and packaging tools
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install "PySide6>=6.8,<7" "PyInstaller>=6.11,<7"

      - name: Run complete quality gate
        shell: pwsh
        run: python scripts/run_local_checks.py

      - name: Verify release version
        shell: pwsh
        run: python scripts/verify_release_version.py "$env:RELEASE_TAG"

      - name: Build Python distributions
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force dist -ErrorAction SilentlyContinue
          python -m build
          $packages = (Get-ChildItem dist -File).FullName
          python -m twine check $packages

      - name: Validate Qt entry point
        shell: pwsh
        run: |
          python -c "from ttg_device_xray.qt_app import default_output_directory; print(default_output_directory())"

      - name: Build standalone Qt executable
        shell: pwsh
        run: |
          & .\packaging\windows\build_exe.ps1 -OutputDir "dist-exe"
          $source = Join-Path $PWD "dist-exe\TTG-Device-XRay.exe"
          $asset = "TTG-Device-XRay-$env:RELEASE_TAG-Windows.exe"
          Move-Item -Force $source (Join-Path $PWD $asset)
          "EXE_ASSET=$asset" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Get-Item $asset | Format-List Name,Length,LastWriteTime

      - name: Generate checksums
        shell: pwsh
        run: |
          $files = @(Get-ChildItem dist -File)
          $files += Get-Item $env:EXE_ASSET
          $lines = foreach ($file in $files) {
            $hash = (Get-FileHash -Algorithm SHA256 $file.FullName).Hash.ToLowerInvariant()
            "$hash  $($file.Name)"
          }
          $lines | Set-Content -Encoding ascii SHA256SUMS
          Get-Content SHA256SUMS

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ttg-device-xray-${{ env.RELEASE_TAG }}
          path: |
            dist/*
            TTG-Device-XRay-v*-Windows.exe
            SHA256SUMS
          if-no-files-found: error
          retention-days: 30

      - name: Attest release provenance
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/*
            TTG-Device-XRay-v*-Windows.exe
          create-storage-record: false

      - name: Create or update GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $assets = @((Get-ChildItem dist -File).FullName)
          $assets += (Get-Item $env:EXE_ASSET).FullName
          $assets += (Get-Item "SHA256SUMS").FullName

          gh release view $env:RELEASE_TAG *> $null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release exists; replacing its generated assets."
            gh release upload $env:RELEASE_TAG $assets --clobber
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          } else {
            $arguments = @(
              "release", "create", $env:RELEASE_TAG
            ) + $assets + @(
              "--generate-notes",
              "--title", "TTG Device X-Ray $env:RELEASE_TAG"
            )

            if ($env:GITHUB_REF_TYPE -eq "tag") {
              $arguments += "--verify-tag"
            } else {
              $arguments += @("--target", $env:GITHUB_SHA)
            }

            & gh @arguments
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
